name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *" # Roda automaticamente toda meia-noite
  workflow_dispatch: # Permite que você rode manualmente quando quiser

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Snake HTML/SVG
        uses: Platane/snk@v3
        with:
          github_user_name: AlissonParra
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
